# macos-bootstrap-kit configuration

# Runtime versions installed through nvm/pyenv.
NODE_VERSION="lts"
PYTHON_VERSION="3.12.4"

# Global npm-based AI coding tools.
NPM_GLOBAL_PACKAGES=(
  "@anthropic-ai/claude-code"
  "@openai/codex"
)

# Shell profile that receives nvm/pyenv initialization snippets.
SHELL_PROFILE="${HOME}/.zshrc"

# Container runtime. Docker CLI and Colima are installed through Brewfile.
REQUIRE_DOCKER="true"
COLIMA_CPU="4"
COLIMA_MEMORY="6"
COLIMA_DISK="80"

# macOS defaults.
DOCK_POSITION="left"
DOCK_ICON_SIZE="42"
DOCK_AUTOHIDE="true"
KEY_REPEAT="2"
INITIAL_KEY_REPEAT="15"
SCREENSHOT_DIR="${HOME}/Screenshots"
FINDER_SHOW_ALL_EXTENSIONS="true"
FINDER_SHOW_HIDDEN_FILES="false"

# Language and keyboard preferences.
# Values below are conservative defaults for English + Russian input sources.
APPLE_LANGUAGES=("en-US" "ru-US")
APPLE_LOCALE="en_US"
APPLE_MEASUREMENT_UNITS="Centimeters"
APPLE_METRIC_UNITS="1"
