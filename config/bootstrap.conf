# macos-bootstrap-kit configuration

# Runtime versions installed through nvm/pyenv.
NODE_VERSION="lts"
PYTHON_VERSION="3.12.4"

# Global npm-based AI coding tools.
NPM_GLOBAL_PACKAGES=(
  "@anthropic-ai/claude-code"
  "@openai/codex"
)

# Shell profile that receives nvm/pyenv initialization snippets.
SHELL_PROFILE="${HOME}/.zshrc"

# Container runtime. Docker CLI and Colima are installed through Brewfile.
REQUIRE_DOCKER="true"
